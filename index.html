<!DOCTYPE html>

<html lang="sv">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Falsmaskin Planering</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Falsmaskin Planering</h1>

<div class="form-box">

<input id="jobName" placeholder="Jobbnamn">

<div class="row">

<div>

<label>Startdatum</label>

<input type="date" id="startDate">

</div>

<div>

<label>Timmar</label>

<input type="number" id="hours" min="1" step="1" placeholder="14">

</div>

</div>

<label>Maskin</label>

<select id="machine">

<option value="1">Falsmaskin 1</option>

<option value="2">Falsmaskin 2</option>

</select>

<button onclick="addJob()">Lägg till jobb</button>

</div>

<div class="calendar-header">

<button onclick="prevMonth()">‹</button>

<h2 id="monthTitle"></h2>

<button onclick="nextMonth()">›</button>

</div>

<div class="weekdays">

<div>Mån</div>

<div>Tis</div>

<div>Ons</div>

<div>Tor</div>

<div>Fre</div>

<div>Lör</div>

<div>Sön</div>

</div>

<div id="calendar" class="calendar"></div>

</div>

<script src="script.js"></script>

</body>

</html>
